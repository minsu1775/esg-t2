spring:
  application:
    name: esgt2

  datasource:
    url: jdbc:h2:mem:esgt2;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # H2 로컬: Hibernate가 스키마 관리 (Flyway는 PostgreSQL 전용)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false   # H2 로컬 개발에서는 Flyway 비활성화

  data:
    redis:
      host: localhost
      port: 6379

  threads:
    virtual:
      enabled: true

  security:
    user:
      name: admin
      password: admin

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

scheduler:
  enabled: false

jwt:
  secret: esg-t2-development-secret-key-must-be-at-least-32-bytes-long
  access-token-expiry-seconds: 900
  refresh-token-expiry-seconds: 604800

intake:
  webhook:
    hmac-secret: ${INTAKE_WEBHOOK_HMAC_SECRET:dev-webhook-secret-must-change-in-prod}

supply:
  activation-base-url: ${SUPPLY_ACTIVATION_BASE_URL:http://localhost:3000/supply/activate}
  reminder:
    reporting-year: ${SUPPLY_REMINDER_YEAR:2025}

logging:
  level:
    ai.claudecode.esgt2: DEBUG
    org.flywaydb: INFO
