# ⚠️ 프로덕션 배포 시 반드시 아래 환경변수를 설정하세요
# DB_URL, DB_USER, DB_PASS, REDIS_HOST, REDIS_PORT
# SPRING_SECURITY_USER_NAME, SPRING_SECURITY_USER_PASSWORD (기본값 admin/admin 덮어쓰기 필수)
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME}
      password: ${SPRING_SECURITY_USER_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/migration-pg   # PostgreSQL 전용 DDL (RLS 정책 등)
    url: ${DB_URL}
    user: ${DB_USER}
    password: ${DB_PASS}

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

scheduler:
  enabled: true

logging:
  level:
    ai.claudecode.esgt2: INFO
    org.flywaydb: INFO
