spring:
  jpa:
    hibernate:
      ddl-auto: validate   # TestContainers PostgreSQL: Flyway 적용 후 Hibernate 검증
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations:
      - classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

scheduler:
  enabled: false
