spring:
  jpa:
    hibernate:
      ddl-auto: none   # TestContainers PostgreSQL: Flyway가 스키마 관리 (검증 불필요)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations:
      - classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

scheduler:
  enabled: false
